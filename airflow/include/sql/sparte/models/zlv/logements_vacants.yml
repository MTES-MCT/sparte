version: 2

models:
  - name: logements_vacants
    columns:
      - name: code_siren
      - name: land_name
        data_tests:
          - not_null
      - name: land_type
        data_tests:
          - not_null
          - accepted_values:
              values:
                - 'COMM'
                - 'DEPART'
                - 'REGION'
