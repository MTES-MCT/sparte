models:
  - name: for_vector_tiles_zonage_urbanisme
    columns:
      - name: checksum
        data_type: text
        data_tests:
          - not_null
      - name: type_zone
        data_type: character varying
        data_tests:
          - not_null
          - accepted_values:
              values:
                - "AU"
                - "A"
                - "N"
                - "U"
      - name: libelle
        data_type: character varying
      - name: libelle_long
        data_type: character varying
      - name: destination_dominante
        data_type: character varying
      - name: date_approbation
        data_type: date
      - name: date_validation
        data_type: date
      - name: id_document_urbanisme
        data_type: character varying
      - name: zonage_surface
        data_type: numeric
        data_tests:
          - not_null
      - name: departement
        data_type: character varying
        data_tests:
          - not_null
          - relationships:
              field: code
              to: ref('departement')
      - name: srid_source
        data_type: integer
        data_tests:
          - not_null
      - name: commune_name
        data_type: character varying
      - name: year
        data_type: integer
      - name: year_index
        data_type: bigint
      - name: artif_surface
        data_type: numeric
      - name: artif_percent
        data_type: numeric
      - name: imper_surface
        data_type: numeric
      - name: imper_percent
        data_type: numeric
      - name: artif_couverture_composition
        data_type: json
      - name: artif_usage_composition
        data_type: json
      - name: imper_couverture_composition
        data_type: json
      - name: imper_usage_composition
        data_type: json
      - name: geom
        data_type: user-defined
        data_tests:
          - not_null
      - name: COMM
        data_type: character varying
        data_tests:
          - relationships:
              field: code
              to: ref('commune')
        quote: true
      - name: EPCI
        data_type: character varying
        data_tests:
          - relationships:
              field: code
              to: ref('epci')
        quote: true
      - name: DEPART
        data_type: character varying
        data_tests:
          - relationships:
              field: code
              to: ref('departement')
        quote: true
      - name: REGION
        data_type: character varying
        data_tests:
          - relationships:
              field: code
              to: ref('region')
        quote: true
      - name: SCOT
        data_type: text
        data_tests:
          - relationships:
              field: id_scot
              to: ref('scot')
        quote: true
